<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>OOH Platform — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A1628;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      color: #F8FAFC;
    }
    .icon {
      width: 64px; height: 64px;
      background: rgba(27,79,138,0.3);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; text-align: center; }
    p  { font-size: 0.9375rem; color: rgba(255,255,255,0.45); text-align: center; max-width: 280px; line-height: 1.6; }
    button {
      background: #1B4F8A; color: #fff; border: none;
      padding: 12px 28px; border-radius: 12px;
      font-size: 0.9375rem; font-weight: 700; cursor: pointer;
      font-family: inherit; box-shadow: 0 4px 16px rgba(27,79,138,0.4);
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>OOH Platform needs an internet connection. Check your network and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
